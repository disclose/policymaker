name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # dioterms (vendor/dioterms submodule) is the canonical source for the
      # policy term templates. Project it into static/templates before generate
      # so the deployed site always serves the pinned canonical language.
      - name: Sync templates from dioterms (canonical source)
        run: node scripts/sync-templates.mjs

      - name: Generate static site
        run: npx nuxt generate

      - name: Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
